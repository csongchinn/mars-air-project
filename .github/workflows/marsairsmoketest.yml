name: Mars Air Smoke Test

on:
  workflow_dispatch:

jobs:
  Navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Test Run
        continue-on-error: true
        run: npx cypress run --spec "cypress/e2e/MarsAirSmoke.feature"

      - name: Generate Cucumber Report
        run: node report.js

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: |
            cypress/reports/
            cypress/screenshots/
          retention-days: 7